<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Installer Cap sur le Quiz</title>
    <style>
      :root {
        --bg1: #fff7dd;
        --bg2: #eaf1eb;
        --text: #143336;
        --button: #0e4b50;
        --button-hover: #0c5e64;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 15% 20%, var(--bg1) 0%, #f4efe4 45%, var(--bg2) 100%);
        padding: 20px;
      }

      .box {
        width: min(560px, 100%);
        text-align: center;
        background: #fffaf0;
        border: 1px solid #ead9ac;
        border-radius: 18px;
        padding: 30px 22px;
        box-shadow: 0 16px 28px rgba(14, 75, 80, 0.14);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.5rem, 4vw, 2.1rem);
      }

      p {
        margin: 0 0 18px;
        line-height: 1.5;
      }

      .btn {
        display: inline-block;
        text-decoration: none;
        background: var(--button);
        color: #fff;
        font-weight: 700;
        padding: 14px 20px;
        border-radius: 12px;
      }

      .btn:hover { background: var(--button-hover); }

      .help {
        margin-top: 16px;
        font-size: 0.93rem;
        opacity: 0.92;
      }
    </style>
  </head>
  <body>
    <main class="box">
      <h1>Cap sur le Quiz</h1>
      <p>Telecharge l'application Android en un clic.</p>

      <a class="btn" href="downloads/latest.apk" download>
        Telecharger l'APK
      </a>

      <p class="help">
        Si besoin: Parametres Android > Securite > Autoriser les sources inconnues.
      </p>
    </main>
  </body>
</html>

<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Installer Cap sur le Quiz</title>
    <style>
      :root {
        --bg1: #fff4d6;
        --bg2: #e7efe8;
        --text: #143336;
        --button: #0e4b50;
        --button-hover: #0c5e64;
        --wa: #25d366;
        --wa-hover: #1da851;
        --card: #fffaf0;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 15% 20%, var(--bg1) 0%, #f4efe4 45%, var(--bg2) 100%);
        padding: 20px;
      }

      .box {
        width: min(920px, 100%);
        background: var(--card);
        border: 1px solid #ead9ac;
        border-radius: 18px;
        padding: 26px;
        box-shadow: 0 16px 28px rgba(14, 75, 80, 0.14);
        display: grid;
        grid-template-columns: 1.05fr 0.95fr;
        gap: 22px;
      }

      .left {
        display: flex;
        flex-direction: column;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo {
        width: 58px;
        height: 58px;
        border-radius: 14px;
        box-shadow: 0 8px 16px rgba(14, 75, 80, 0.22);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.5rem, 4vw, 2.1rem);
      }

      p {
        margin: 14px 0 18px;
        line-height: 1.5;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .btn,
      .wa {
        display: inline-block;
        text-decoration: none;
        color: #fff;
        font-weight: 700;
        padding: 14px 20px;
        border-radius: 12px;
      }

      .btn {
        background: var(--button);
      }

      .btn:hover { background: var(--button-hover); }

      .wa {
        background: var(--wa);
      }

      .wa:hover {
        background: var(--wa-hover);
      }

      .preview {
        background: #f3eddc;
        border: 1px solid #e7d9b4;
        border-radius: 16px;
        padding: 12px;
        display: grid;
        place-items: center;
      }

      .phone {
        width: 100%;
        max-width: 340px;
        aspect-ratio: 9 / 19.5;
        border: 10px solid #20353a;
        border-radius: 26px;
        overflow: hidden;
        box-shadow: 0 14px 24px rgba(20, 51, 54, 0.25);
        background: #ffffff;
      }

      .phone iframe {
        width: 100%;
        height: 100%;
        border: 0;
      }

      .help {
        margin-top: 14px;
        font-size: 0.93rem;
        opacity: 0.92;
      }

      @media (max-width: 860px) {
        .box {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="box">
      <section class="left">
        <div class="brand">
          <img class="logo" src="android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png" alt="Logo Cap sur le Quiz" />
          <h1>Cap sur le Quiz</h1>
        </div>

        <p>
          Telecharge l'application Android en un clic et partage-la facilement
          avec tes amis.
        </p>

        <div class="actions">
          <a class="btn" href="downloads/latest.apk" download>
            Telecharger l'APK
          </a>
          <a
            class="wa"
            target="_blank"
            rel="noopener noreferrer"
            href="https://wa.me/?text=Telecharge%20Cap%20sur%20le%20Quiz%20ici%20%3A%20https%3A%2F%2Ffaciletechnologie375-source.github.io%2FQuizz-Aline%2Finstaller.html"
          >
            Partager sur WhatsApp
          </a>
        </div>

        <p class="help">
          Si besoin: Parametres Android > Securite > Autoriser les sources inconnues.
        </p>
      </section>

      <section class="preview">
        <div class="phone" aria-label="Apercu de l'application">
          <iframe src="index.html" title="Apercu Cap sur le Quiz"></iframe>
        </div>
      </section>
    </main>
  </body>
</html>
